# pvc-nfs.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-nfs-rwx
spec:
  storageClassName: nfs-share
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
# deployment-nfs.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-nfs
spec:
  replicas: 2
  selector: {matchLabels: {app: nfs-app}}
  template:
    metadata: {labels: {app: nfs-app}}
    spec:
      containers:
      - name: app
        image: nginx
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: shared
      volumes:
      - name: shared
        persistentVolumeClaim:
          claimName: pvc-nfs-rwx
